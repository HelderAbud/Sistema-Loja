# Desenvolvimento local. Não use estes valores em produção.
# A porta 5432 exposta serve apenas para ferramentas no host; em produção o Postgres não deve ser público.
services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: lojapp
      POSTGRES_USER: lojapp
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-lojapp_local_dev_only}
    ports:
      - "5432:5432"
    volumes:
      - lojapp_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lojapp -d lojapp"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  api:
    build: .
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: docker,jsonlogs
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/lojapp
      SPRING_DATASOURCE_USERNAME: lojapp
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-lojapp_local_dev_only}
      SPRING_DATA_REDIS_HOST: redis
      LOJAPP_RATE_LIMIT_MODE: redis
      LOJAPP_JWT_SECRET: ${LOJAPP_JWT_SECRET}
      LOJAPP_REGISTRATION_ENABLED: ${LOJAPP_REGISTRATION_ENABLED:-false}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

volumes:
  lojapp_pgdata:
