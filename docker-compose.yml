# Desenvolvimento local: copie .env.example para .env e defina POSTGRES_PASSWORD e LOJAPP_JWT_SECRET.
# Sem literais de segredo neste ficheiro (Trivy/CI e boas práticas de portfólio).
services:
  db:
    image: postgres:16
    container_name: loja-postgres
    environment:
      POSTGRES_DB: loja_db
      POSTGRES_USER: loja_user
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?defina POSTGRES_PASSWORD no .env}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U loja_user -d loja_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: loja-redis
    ports:
      - "6379:6379"

  api:
    build: .
    container_name: loja-api
    ports:
      - "8000:8000"
    environment:
      # Alinhado a application.yml (8000), vite.config.ts (proxy) e scripts de smoke/verify.
      SERVER_PORT: 8000
      # Hostname tem de ser o *nome do serviço* na rede Compose: "db", não o container_name.
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/loja_db
      SPRING_DATASOURCE_USERNAME: loja_user
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:?defina POSTGRES_PASSWORD no .env}
      # Starter Redis: dentro do contentor não há Redis em localhost; aponta para o serviço redis.
      SPRING_DATA_REDIS_HOST: redis
      LOJAPP_JWT_SECRET: ${LOJAPP_JWT_SECRET:?defina LOJAPP_JWT_SECRET no .env}
      # Dev local: permite POST /api/v1/auth/register. Em produção manter false ou controlar domínios/convite.
      LOJAPP_REGISTRATION_ENABLED: "true"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started

volumes:
  postgres_data: