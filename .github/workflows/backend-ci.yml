name: Backend CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Run unit and architecture tests
        run: mvn -B -Pci-unit-tests test

  integration-schema-gate:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: lojapp
          POSTGRES_USER: lojapp
          POSTGRES_PASSWORD: lojapp
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U lojapp -d lojapp"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Run integration tests with Flyway schema validation
        env:
          TESTCONTAINERS_RYUK_DISABLED: "true"
        run: mvn -B -Pci-integration-tests test
