name: CI

on:
  push:
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  repo-hygiene:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Block committed local artifacts
        run: |
          forbidden_regex='(^|/)node_modules/|(^|/)backup\.sql$|(^|/)frontend/playwright-report/|(^|/)frontend/test-results/'
          if git ls-files | grep -E "$forbidden_regex" >/dev/null; then
            echo "Erro: arquivos/pastas locais não devem ser versionados (node_modules, backup.sql, reports de teste)."
            echo "Remova do git e mantenha no .gitignore."
            exit 1
          fi

  backend-unit:
    needs: [repo-hygiene]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven
      - name: Run backend unit tests
        run: chmod +x mvnw && ./mvnw -B -Pci-unit-tests test

  backend-integration:
    needs: [repo-hygiene]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven
      - name: Run backend integration tests (Docker/Testcontainers)
        run: chmod +x mvnw && ./mvnw -B -Pci-integration-tests test

  frontend:
    needs: [repo-hygiene]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Test & build frontend
        working-directory: frontend
        run: |
          npm ci
          npm run lint
          npm run test
          npx playwright install --with-deps chromium
          npm run e2e
          npm run build

  docker-image:
    needs: [backend-unit, backend-integration]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build API image
        run: docker build -t lojapp:ci .
      # CRITICAL + HIGH com fix disponível; CVEs sem patch (só “unfixed”) não bloqueiam o merge.
      - name: Trivy — imagem
        uses: aquasecurity/trivy-action@v0.33.1
        with:
          image-ref: lojapp:ci
          vuln-type: os,library
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: "1"

  security-fs:
    needs: [repo-hygiene]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Trivy — filesystem (SAST/dependencies/secrets baseline)
        uses: aquasecurity/trivy-action@v0.33.1
        with:
          scan-type: fs
          scan-ref: .
          scanners: vuln,secret,misconfig
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: "1"
