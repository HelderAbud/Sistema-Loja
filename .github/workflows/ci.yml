name: CI

on:
  push:
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend-unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven
      - name: Run backend unit tests
        run: mvn -B -Pci-unit-tests test

  backend-integration:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven
      - name: Run backend integration tests (Docker/Testcontainers)
        run: mvn -B -Pci-integration-tests test

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Test & build frontend
        working-directory: frontend
        run: |
          npm ci
          npm run lint
          npm run test
          npx playwright install --with-deps chromium
          npm run e2e
          npm run build

  docker-image:
    needs: [backend-unit, backend-integration]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build API image
        run: docker build -t lojapp:ci .
      # CRITICAL + HIGH com fix disponível; CVEs sem patch (só “unfixed”) não bloqueiam o merge.
      - name: Trivy — imagem
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: lojapp:ci
          vuln-type: os,library
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: "1"
