# Exemplo produção: definir POSTGRES_PASSWORD e LOJAPP_JWT_SECRET antes de `docker compose -f docker-compose.prod.yml up -d`.
# Perfis Spring: prod,jsonlogs (Swagger desligado; JWT validado).

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: lojapp
      POSTGRES_USER: lojapp
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?defina POSTGRES_PASSWORD}
    volumes:
      - lojapp_pgdata_prod:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lojapp -d lojapp"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  api:
    build: .
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: prod,jsonlogs
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/lojapp
      SPRING_DATASOURCE_USERNAME: lojapp
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:?defina POSTGRES_PASSWORD}
      SPRING_DATA_REDIS_HOST: redis
      LOJAPP_RATE_LIMIT_MODE: redis
      LOJAPP_JWT_SECRET: ${LOJAPP_JWT_SECRET:?defina LOJAPP_JWT_SECRET com valor aleatorio forte}
      LOJAPP_CORS_ORIGINS: ${LOJAPP_CORS_ORIGINS:-https://app.exemplo.com}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://127.0.0.1:8080/actuator/health >/dev/null || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 90s
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 768M

volumes:
  lojapp_pgdata_prod:
